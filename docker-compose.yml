services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    working_dir: /workspace
    env_file:
      - path: ./.env.example
      - path: ./.env
        required: false
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://root:your-password@host.docker.internal:5432/ai_hotspot_radar}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE_URL: /
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  web_dev:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile.web
    working_dir: /workspace/apps/web
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]
    env_file:
      - path: ./.env.example
      - path: ./.env
        required: false
    depends_on:
      - api
    ports:
      - "3000:3000"
